name: Go

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.0', '1.25.7']
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go ${{ matrix.go-version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}

    - name: Build
      run: go build ./...

    - name: Test with race detection
      run: go test ./... -race

    - name: Test short
      run: go test ./... -short

    - name: Benchmarks
      run: go test ./... -bench=. -benchtime=1s

    - name: Vet
      run: go vet ./...

    - name: Check formatting
      run: test -z "$(gofmt -d .)"