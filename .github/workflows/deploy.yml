name: Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]



jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./...

      - name: Build backend
        run: go build -o village ./cmd/village

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build -- --configuration production



  deploy:
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add host to known hosts
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || '22' }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH (if configured)
        if: ${{ secrets.SSH_PRIVATE_KEY != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          script: |
            set -e
            cd /opt/village
            git pull origin main
            docker-compose --env-file .env.production up --build -d
            # Health check with retry
            for i in {1..5}; do
              if curl -f http://localhost:8080/health && curl -f http://localhost:80/health; then
                echo "Both services healthy"
                exit 0
              fi
              echo "Health check attempt $i/5 failed, retrying in 5 seconds..."
              sleep 5
            done
            echo "Health check failed after 5 attempts"
            docker-compose logs
            exit 1

      - name: Deploy locally (fallback)
        if: ${{ secrets.SSH_PRIVATE_KEY == '' }}
        run: |
          docker-compose up --build -d
          # Health check with retry
          for i in {1..5}; do
            if curl -f http://localhost:8080/health && curl -f http://localhost:80/health; then
              echo "Both services healthy"
              exit 0
            fi
            echo "Health check attempt $i/5 failed, retrying in 5 seconds..."
            sleep 5
          done
          echo "Health check failed after 5 attempts"
          docker-compose logs
          exit 1