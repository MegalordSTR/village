services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: village
      POSTGRES_USER: village
      POSTGRES_PASSWORD: village
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U village"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - village-network

  backend:
    build:
      context: .
      target: backend
    environment:
      DATABASE_URL: postgres://village:village@postgres:5432/village?sslmode=disable
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - village-network
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep village | grep -v grep || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - village-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  village-network:
    driver: bridge