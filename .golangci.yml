version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - gocyclo
    - gocognit
    - prealloc
    - gosec

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: .*_test\.go$
      linters:
        - gocyclo
        - gocognit
        - errcheck

linters-settings:
  gosec:
    excludes:
      - G204  # subprocess launched with variable (acceptable in tests)
      - G404  # weak random number generator (deterministic simulation)
      - G115  # integer overflow (safe in context)
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 20

output:
  format: colored-line-number